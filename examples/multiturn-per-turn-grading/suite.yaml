name: multiturn-per-turn-grading-test
description: Demonstrates per-turn grading for multi-turn conversations
dataset: dataset.jsonl
target:
  kind: letta_code
  model_handles:
    - openai/gpt-5-mini
  base_url: https://api.letta.com/
graders:
  correctness:
    kind: tool
    display_name: "Correctness"
    function: contains
    extractor: last_assistant
reward:
  kind: metric
  metric_key: correctness
