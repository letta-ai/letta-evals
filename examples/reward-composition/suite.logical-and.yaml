name: ascii-art-quality-if-ascii
description: Demonstrates a custom reward composer that zeroes quality when ASCII validation fails
dataset: dataset.csv
target:
  kind: letta_code
  model_handles:
    - openai/gpt-5-mini
  base_url: https://api.letta.com/
graders:
  quality:
    kind: model_judge
    display_name: "rubric score"
    prompt_path: rubric.txt
    model: gpt-5-mini
    temperature: 0.0
    provider: openai
    max_retries: 3
    timeout: 120.0
    extractor: last_assistant
  ascii_only:
    kind: tool
    display_name: "ascii character check"
    function: ascii_printable_only
    extractor: last_assistant
reward:
  kind: custom
  function: rewards.py:quality_if_ascii
