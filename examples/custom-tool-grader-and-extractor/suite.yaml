name: ticket-classification-custom-grader
description: Demonstrates a custom extractor and custom grader for structured JSON outputs
dataset: dataset.jsonl
target:
  kind: letta_code
  model_handles:
    - openai/gpt-5.4-mini-medium
  base_url: https://api.letta.com/
graders:
  ticket_classification:
    kind: tool
    function: custom_evaluators.py:ticket_classification_grader
    extractor: custom_evaluators.py:json_object_extractor
gate:
  kind: simple
  metric_key: ticket_classification
  aggregation: avg_score
  op: gte
  value: 0.3
