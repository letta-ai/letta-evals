name: letta-code-bug-fix-test
description: Test if letta-code can find and fix bugs in Python files
dataset: dataset.jsonl
num_runs: 1
setup_script: setup.py:prepare_evaluation
max_samples: 3

target:
  kind: letta_code
  base_url: https://api.letta.com/
  timeout: 300
  max_retries: 3
  model_handles:
    - anthropic/claude-sonnet-4-5-20250929

graders:
  bug_fix_check:
    kind: tool
    function: custom_python_grader.py:python_output_grader
    extractor: last_assistant
reward:
  kind: metric
  metric_key: bug_fix_check
# Run every sample inside a fresh Modal sandbox: the letta-code agent edits
# the buggy file and the grader executes the fixed file, all in-sandbox. The
# whole suite directory (including the staged sandbox/ files) is uploaded to
# /mnt/suite, and the in-sandbox CLI runs from there so the agent's cwd holds
# sandbox/task_*.py. LETTA_API_KEY is auto-forwarded from your host env
# (./.env is auto-loaded), so no Modal Secret setup is needed. To pin a secret
# in Modal instead, add `secrets: [letta-api-key]`.
sandbox:
  kind: modal
  cpu: 2
  memory_mb: 4096
  timeout_sec: 1800
  block_network: false
  # Pin the @letta-ai/letta-code version installed in the sandbox image.
  # Omit to track the npm `latest` tag.
  letta_code_version: "0.27.16"
