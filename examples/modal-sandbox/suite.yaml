name: modal-sandbox-example
description: Minimal example showing how to run every sample inside a Modal sandbox.
dataset: samples.jsonl

target:
  kind: letta_code
  model_handles:
    - openai/gpt-4.1

graders:
  acc:
    kind: tool
    function: exact_match

gate:
  kind: simple
  metric_key: acc
  op: gte
  value: 1.0

# Per-sample isolated execution. Each sample dispatches into a fresh
# Modal sandbox; target + extractors + graders run inside it; the host
# only sees the final SampleResult JSON.
#
# `image` is optional — when omitted, the driver builds the base image
# on demand from the bundled letta_evals/sandbox/Dockerfile (cached after
# the first build), which carries letta-evals (pip) and @letta-ai/letta-code
# (npm). Override `image` only when you need extra system tools the agent
# invokes.
# Secrets: LETTA_API_KEY, OPENAI_API_KEY, etc. are auto-forwarded from your
# host env (and ./.env is auto-loaded at startup), so no setup is needed for
# the common keys. Use `forward_env: [EXTRA_KEY]` for extras, or `secrets:`
# for pre-created named Modal Secrets (preferred for shared/CI use).
sandbox:
  kind: modal
  # forward_env: [MY_CUSTOM_KEY]          # extra host env vars to forward
  # secrets: [some-named-modal-secret]    # pre-uploaded named Modal Secrets
  cpu: 2
  memory_mb: 4096
  timeout_sec: 1800
  block_network: false
