name: per-sample-rubric-example
description: Demonstrates per-sample rubric overrides (inline `rubric` and `rubric_path` on a dataset row override the grader-level rubric for that sample).
dataset: dataset.jsonl
target:
  kind: letta_code
  model_handles:
    - openai/gpt-5-mini
  base_url: https://api.letta.com/
graders:
  quality:
    kind: model_judge
    display_name: "rubric score"
    prompt_path: rubric.txt  # suite-level default; overridden per-sample if the row specifies rubric/rubric_path
    model: gpt-5-mini
    temperature: 0.0
    provider: openai
    max_retries: 3
    timeout: 120.0
    extractor: last_assistant
reward:
  kind: metric
  metric_key: quality
