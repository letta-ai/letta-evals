name: core-memory-read-test
description: Test if agent can correctly read information from core memory to answer questions about people and facts
dataset: ../datasets/core_memory_read.jsonl
max_samples: 100  # Limit to first 100 samples for faster testing
target:
  kind: letta_code
  base_url: http://localhost:8283
  agent_script: ../setup_agent.py:setup_agent
  model_handles:
    - gpt-4.1-2025-04-14
    - gpt-4.1-2025-04-14-nano
grader:
  kind: tool
  function: contains
  extractor: last_assistant
reward:
  kind: metric
  metric_key: accuracy
