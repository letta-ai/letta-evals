name: core-memory-update-test
description: Test if agent can correctly update information in core memory when presented with contradictory facts
dataset: ../datasets/core_memory_update.jsonl
target:
  kind: letta_code
  base_url: http://localhost:8283
  agent_script: ../setup_agent.py:setup_agent
  model_handles:
    - gpt-4.1-2025-04-14
    - gpt-4.1-2025-04-14-mini
    - gpt-4.1-2025-04-14-nano
    - gpt-5-2025-08-07
    - gpt-5-2025-08-07-mini
    - gpt-5-2025-08-07-nano
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
    - claude-opus-4-1-20250805
    - openai/gpt-oss-120b
    - openai/gpt-oss-20b
    - moonshotai/kimi-k2-0905
    - deepseek/deepseek-chat-v3.1
    - z-ai/glm-4.6

graders:
  contains_check:
    kind: model_judge
    prompt_path: ../rubric.txt
    model: gpt-5-mini
    temperature: 0.0
    provider: openai
    extractor: last_assistant

reward:
  kind: metric
  metric_key: accuracy
