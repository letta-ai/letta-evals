name: filesystem-memfs-smoke
description: Single-sample smoke test of the prose-memfs filesystem eval
dataset: datasets/filesystem_memfs_smoke.jsonl
num_runs: 1

target:
  kind: letta_code
  base_url: https://api.letta.com/
  sandbox: false
  timeout: 600
  max_retries: 0
  agent_script: setup_memfs_agent.py:setup_memfs_agent
  permission_mode: memory
  flags: "--system default --conv default"
  model_handles:
    - anthropic/claude-sonnet-4-6

graders:
  rubric_check:
    kind: model_judge
    prompt_path: rubric.txt
    model: gpt-5-mini
    temperature: 0.0
    provider: openai
    extractor: last_assistant

gate:
  kind: simple
  metric_key: rubric_check
  aggregation: avg_score
  op: gte
  value: 0.0  # smoke: don't gate
