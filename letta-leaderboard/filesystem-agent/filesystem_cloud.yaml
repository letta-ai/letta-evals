name: filesystem-cloud
description: Test if agent can correctly retrieve and analyze information from filesystem data files
dataset: datasets/filesystem_cloud.jsonl
setup_script: setup_cloud_agent.py:prepare_evaluation
num_runs: 3

target:
  kind: letta_code
  base_url: http://localhost:9005  # local
  # base_url: https://api.letta.com/  # cloud
  agent_script: setup_cloud_agent.py:setup_agent
  model_handles:
    - gpt-5.2-2025-12-11
    - gpt-5.2-2025-12-11
    - gpt-5.2-2025-12-11
    - gpt-5.1-2025-11-13
    - gpt-5.1-2025-11-13-codex
    - gpt-5.1-2025-11-13-codex-mini
    - gpt-4.1-2025-04-14
    - gpt-4.1-2025-04-14-mini
    - gpt-4.1-2025-04-14-nano
    - gpt-5-2025-08-07
    - gpt-5-2025-08-07-mini
    - gpt-5-2025-08-07-nano
    - claude-opus-4-6
    - claude-opus-4-5-20251101
    - claude-sonnet-4-5-20250929
    - claude-haiku-4-5-20251001
    - claude-opus-4-1-20250805
    - openai/gpt-oss-120b
    - openai/gpt-oss-20b
    - moonshotai/kimi-k2-0905
    - deepseek/deepseek-chat-v3.1
    - z-ai/glm-4.6
    - minimax/minimax-m2
    - gemini-3-pro-preview
    - gemini-3-flash-preview
    - deepseek-reasoner
    - deepseek-chat
    - mistralai/mistral-large-2512

graders:
  rubric_check:
    kind: model_judge
    prompt_path: rubric.txt
    model: gpt-5-mini
    temperature: 0.0
    provider: openai
    extractor: last_assistant

reward:
  kind: metric
  metric_key: accuracy
